model:
  name: "mobilenet_v2"
  pretrained: true
  num_classes: 38
  dropout: 0.3

dataset:
  name: "plantvillage"
  path: "datasets_substrate/raw/plant_disease_merged"
  batch_size: 32
  val_split: 0.15
  test_split: 0.10

optimizer:
  type: "AdamW"
  lr: 0.0001
  weight_decay: 0.01

training:
  epochs: 25
  early_stopping: 5
  device: "cuda"
  save_dir: "models/saved/"
